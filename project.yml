name: LifeCall
options:
  bundleIdPrefix: ai.halo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  ElevenLabs:
    url: https://github.com/elevenlabs/elevenlabs-swift-sdk
    from: 2.0.0

settings:
  base:
    DEVELOPMENT_TEAM: "TFAYL6D4RR"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "LifeCall needs the microphone to talk with your AI insurance agent."
    INFOPLIST_KEY_UILaunchScreen_Generation: YES

targets:
  LifeCall:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: ElevenLabs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.halo.lifecall
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LifeCall.entitlements
