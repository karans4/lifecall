name = "lifecall"
main = "src/worker.js"
compatibility_date = "2025-06-01"

# Public-facing config (non-secret). Secrets are set via `wrangler secret put`.
[vars]
APPLE_BUNDLE_ID    = "ai.halo.lifecall"     # aud claim the Apple identity token must match
OPENROUTER_MODEL   = "moonshotai/kimi-k2-0905"  # served by Groq (US, low-latency)
OPENROUTER_PROVIDERS = "fireworks,together,baseten,groq"  # US inference hosts only
OPENROUTER_REFERER = "https://lifecall.app"
USER_MONTHLY_CAP   = "2000"                  # per-user request cap / month (429 when hit)
GLOBAL_MONTHLY_CAP = "100000"                # global request cap / month (503 when hit)
DAILY_DIAL_CAP     = "200"                    # max outbound dials per account per day
EMAIL_FROM         = "Jordan <jordan@lifecall.app>"
ELEVENLABS_AGENT_ID        = "agent_3101kvhs4g20f01t75rbs6bj8702"
ELEVENLABS_PHONE_NUMBER_ID = "phnum_5001kvjyrtq9fbp9qea9ejme8y5n"
STRIPE_PRICE_PRO   = "price_1TkR3i3Kuauynw4HZxP3xyAp"  # LifeCall Pro $99/mo (test)

# Per-user metering + session cache (eventually-consistent, fine for soft limits).
[[kv_namespaces]]
binding = "USAGE"
id = "73e71d6af2774326a561dfe2ae8078d6"

# Relational store for leads (owner-scoped).
[[d1_databases]]
binding = "DB"
database_name = "lifecall"
database_id = "e0348236-8072-4a5c-9ee6-7cd2c93e6e60"

# Private object storage for generated PDFs (served via owner-scoped worker routes).
[[r2_buckets]]
binding = "DOCS"
bucket_name = "lifecall-documents"

# Secrets (set with: npx wrangler secret put <NAME>)
#   OPENROUTER_API_KEY   - OpenRouter inference key
#   SESSION_SECRET       - 32+ byte HMAC key for minting session tokens
#   RESEND_API_KEY       - Resend transactional email
#   ELEVENLABS_API_KEY   - ElevenLabs (agent/TTS) — used server-side only
#   TWILIO_ACCOUNT_SID   - Twilio (outbound phone), provisioning
#   TWILIO_AUTH_TOKEN    - Twilio auth
